<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Random Rogue">
  <meta name="theme-color" content="#181425">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Random Rogue</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #000; height: 100%;
      overflow: hidden;
      touch-action: none;              /* no pinch zoom / scroll on iPad */
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;       /* no rubber-band bounce */
      position: fixed; width: 100%;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <script>
    var Module = {
      canvas: (function () { return document.getElementById('canvas'); })()
    };
    // iOS Safari: block double-tap-to-zoom inside the game.
    document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    // PWA: offline play after the first visit (R5).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
  {{{ SCRIPT }}}
</body>
</html>
