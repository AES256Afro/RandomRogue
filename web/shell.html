<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Random Rogue">
  <meta name="theme-color" content="#181425">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Random Rogue</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #000; height: 100%;
      overflow: hidden;
      touch-action: none;              /* no pinch zoom / scroll on iPad */
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;       /* no rubber-band bounce */
      position: fixed; width: 100%;
    }
    #canvas {
      display: block;
      position: absolute;
      inset: 0;
      margin: auto;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #status-note {
      display: none; position: fixed; z-index: 5; left: 50%; bottom: 10px;
      transform: translateX(-50%); padding: 9px 12px; border: 2px solid #ffcd75;
      background: #181425; color: #ffcd75; font: 12px monospace; cursor: pointer;
      max-width: calc(100vw - 24px); text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status-note" role="status" aria-live="polite"></div>
  <script>
    // Browsers suspend AudioContexts created before a user gesture, which
    // silenced the whole soundtrack. Capture every context the engine makes
    // and resume them on the first real interaction (R9c).
    (function () {
      var ctxs = [];
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      function Wrapped(opts) {
        var c = opts !== undefined ? new AC(opts) : new AC();
        ctxs.push(c);
        return c;
      }
      Wrapped.prototype = AC.prototype;
      window.AudioContext = Wrapped;
      if (window.webkitAudioContext) window.webkitAudioContext = Wrapped;
      function resumeAll() {
        for (var i = 0; i < ctxs.length; i++) {
          if (ctxs[i].state === 'suspended') { try { ctxs[i].resume(); } catch (e) {} }
        }
      }
      ['pointerdown', 'touchstart', 'mousedown', 'keydown'].forEach(function (t) {
        document.addEventListener(t, resumeAll, true);
      });
    })();
    var Module = {
      canvas: (function () { return document.getElementById('canvas'); })()
    };
    // Community mods: ?mod=<url-of-events-json> merges an extra deck (R7).
    // Data only - the file is parsed as event JSON, never executed.
    window.__rrMod = "";
    try {
      var modUrl = new URLSearchParams(location.search).get('mod');
      if (modUrl) {
        fetch(modUrl).then(function (r) { return r.text(); })
          .then(function (t) { if (t && t.length < 2000000) window.__rrMod = t; })
          .catch(function () {});
      }
    } catch (e) {}
    // iOS Safari: block double-tap-to-zoom inside the game.
    document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    // PWA: offline play after the first visit (R5).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (registration) {
          registration.addEventListener('updatefound', function () {
            var worker = registration.installing;
            if (!worker) return;
            worker.addEventListener('statechange', function () {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                var note = document.getElementById('status-note');
                note.textContent = 'A new version is ready. Tap to reload.';
                note.style.display = 'block';
                note.onclick = function () { location.reload(); };
              }
            });
          });
        }).catch(function () {});
      });
    }
    function showConnectionState() {
      var note = document.getElementById('status-note');
      if (!navigator.onLine) {
        note.textContent = 'Offline mode. Your run is still saved on this device.';
        note.style.display = 'block';
        note.onclick = null;
      } else if (note.textContent.indexOf('Offline mode') === 0) {
        note.style.display = 'none';
      }
    }
    window.addEventListener('offline', showConnectionState);
    window.addEventListener('online', showConnectionState);
    showConnectionState();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
