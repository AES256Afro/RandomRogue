name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: random-rogue-windows
          path: |
            build/Release/random_rogue.exe
            build/Release/assets
            build/random_rogue.exe
            build/assets

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install raylib build deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Validate content
        run: ./build/validate assets
      - name: Determinism gate (chronicle must generate)
        run: ./build/chronicle_dump 90210 assets | head -5
      - uses: actions/upload-artifact@v4
        with:
          name: random-rogue-linux
          path: |
            build/random_rogue
            build/assets

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: random-rogue-macos
          path: |
            build/random_rogue
            build/assets

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - name: Configure
        run: emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release -DPLATFORM=Web
      - name: Build
        run: cmake --build build-web
      - name: Package for itch.io (index.html expected)
        run: |
          mkdir -p dist
          cp build-web/random_rogue.html dist/index.html
          cp build-web/random_rogue.js build-web/random_rogue.wasm build-web/random_rogue.data dist/
      - uses: actions/upload-artifact@v4
        with:
          name: random-rogue-web
          path: dist

  # random-rogue.com: landing page + playable build, via GitHub Pages
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - name: Build web
        run: |
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release -DPLATFORM=Web
          cmake --build build-web
      - name: Assemble site
        run: |
          mkdir -p _site/play
          cp site/index.html _site/
          cp build-web/random_rogue.html _site/play/index.html
          cp build-web/random_rogue.js build-web/random_rogue.wasm build-web/random_rogue.data _site/play/
          cp site/play/manifest.webmanifest site/play/sw.js site/play/icon-192.png site/play/icon-512.png _site/play/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
